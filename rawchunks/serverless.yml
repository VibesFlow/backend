service: rawchunks

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  timeout: 30
  memorySize: 1024  # Increased for audio processing
  apiGateway:
    minimumCompressionSize: 1024
  environment:
    BUCKET_NAME: ${self:custom.bucketName}
    PINATA_JWT: ${env:PINATA_JWT}
    FILECOIN_PRIVATE_KEY: ${env:FILECOIN_PRIVATE_KEY}
    FILECOIN_NETWORK: ${env:FILECOIN_NETWORK, 'calibration'}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
      Resource: "arn:aws:s3:::${self:custom.bucketName}/*"
    - Effect: Allow
      Action:
        - s3:ListBucket
      Resource: "arn:aws:s3:::${self:custom.bucketName}"

custom:
  bucketName: vibesflow-raw-chunks-${self:provider.stage}

functions:
  uploadChunk:
    handler: raw.uploadChunk
    events:
      - http:
          path: /upload
          method: post
          cors: true

  options:
    handler: raw.options
    events:
      - http:
          path: /upload
          method: options
          cors: true

  health:
    handler: raw.health
    events:
      - http:
          path: /health
          method: get
          cors: true

  filecoinStatus:
    handler: raw.filecoinStatus
    events:
      - http:
          path: /filecoin/status/{rtaId}
          method: get
          cors: true
      - http:
          path: /filecoin/status
          method: get
          cors: true

  processFilecoinQueue:
    handler: raw.processFilecoinQueue
    events:
      - http:
          path: /filecoin/process
          method: post
          cors: true
      - http:
          path: /filecoin/process/{rtaId}
          method: post
          cors: true

  testFilecoinConnection:
    handler: raw.testFilecoinConnection
    events:
      - http:
          path: /filecoin/test
          method: get
          cors: true

  getRTAData:
    handler: raw.getRTAData
    events:
      - http:
          path: /rta/{rtaId}
          method: get
          cors: true

  getChunkCIDs:
    handler: raw.getChunkCIDs
    events:
      - http:
          path: /chunks/{rtaId}
          method: get
          cors: true
      - http:
          path: /chunks/{rtaId}/{chunkId}
          method: get
          cors: true

  updateChunkMetadata:
    handler: raw.updateChunkMetadata
    events:
      - http:
          path: /chunks/update
          method: post
          cors: true

resources:
  Resources:
    RawChunksBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
                - DELETE
                - HEAD
              MaxAge: 3000

plugins:
  - serverless-offline